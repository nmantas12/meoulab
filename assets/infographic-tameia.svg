<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" role="img" aria-label="Ασφαλιστικά ταμεία με τα οποία συνεργάζεται το Meoulab: ΕΟΠΥΥ, ΕΟΠΥΥ Ευρωπαίοι Πολίτες, Ταμεία Στρατού ΥΕΘΑ, ΕΔΟΕΑΠ, Interamerican">
  <defs>
    <linearGradient id="hub" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a4d95"/>
      <stop offset="1" stop-color="#4f2668"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#3f1e52" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- connectors -->
  <g stroke="#c9b4dd" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 11" fill="none">
    <path d="M500 300 L500 70"/>
    <path d="M500 300 L718 229"/>
    <path d="M500 300 L635 486"/>
    <path d="M500 300 L365 486"/>
    <path d="M500 300 L282 229"/>
  </g>

  <!-- center hub -->
  <circle cx="500" cy="300" r="94" fill="url(#hub)"/>
  <circle cx="500" cy="300" r="94" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
  <g transform="translate(500 274)" fill="none" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 -20 -22 -11v14c0 12 9 18 22 24 13-6 22-12 22-24v-14z"/>
    <path d="m-9 4 6 6 11-13"/>
  </g>
  <text x="500" y="338" text-anchor="middle" fill="#ffffff" font-family="Manrope, Segoe UI, sans-serif" font-size="21" font-weight="800" letter-spacing="1.5">MEOULAB</text>

  <!-- ============ badges ============ -->
  <!-- ΕΟΠΥΥ (top) -->
  <g filter="url(#soft)">
    <rect x="393" y="37" width="214" height="66" rx="18" fill="#ffffff" stroke="#ece5f3" stroke-width="1.5"/>
  </g>
  <circle cx="431" cy="70" r="22" fill="#f0e5f3"/>
  <g transform="translate(431 70)" fill="none" stroke="#7a4d95" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M0 -12-13-6.5v8.4C-13 2 -7.6 6 0 9c7.6-3 13-7 13-14.5v-8.4z"/><path d="m-5 0 3.5 3.5L5-3"/></g>
  <text x="466" y="78" fill="#3f1e52" font-family="Manrope, Segoe UI, sans-serif" font-size="23" font-weight="800" letter-spacing="0.5">ΕΟΠΥΥ</text>

  <!-- ΕΟΠΥΥ Ευρωπαίοι (right-upper) -->
  <g filter="url(#soft)">
    <rect x="611" y="196" width="214" height="66" rx="18" fill="#ffffff" stroke="#ece5f3" stroke-width="1.5"/>
  </g>
  <circle cx="649" cy="229" r="22" fill="#f0e5f3"/>
  <g transform="translate(649 229)" fill="none" stroke="#7a4d95" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="0" cy="0" r="12"/><path d="M-12 0h24M0 -12a16 16 0 0 1 0 24M0 -12a16 16 0 0 0 0 24"/></g>
  <text x="683" y="223" fill="#3f1e52" font-family="Manrope, Segoe UI, sans-serif" font-size="18" font-weight="800">ΕΟΠΥΥ</text>
  <text x="683" y="245" fill="#7a4d95" font-family="Manrope, Segoe UI, sans-serif" font-size="15" font-weight="600">Ευρωπαίοι Πολίτες</text>

  <!-- Interamerican (right-lower) -->
  <g filter="url(#soft)">
    <rect x="528" y="453" width="214" height="66" rx="18" fill="#ffffff" stroke="#ece5f3" stroke-width="1.5"/>
  </g>
  <circle cx="566" cy="486" r="22" fill="#f0e5f3"/>
  <g transform="translate(566 486)" fill="none" stroke="#7a4d95" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M0 11c-6-3.6-11-8-11-13a5 5 0 0 1 11-2 5 5 0 0 1 11 2c0 5-5 9.4-11 13z"/></g>
  <text x="600" y="492" fill="#3f1e52" font-family="Manrope, Segoe UI, sans-serif" font-size="19" font-weight="800">Interamerican</text>

  <!-- ΕΔΟΕΑΠ (left-lower) -->
  <g filter="url(#soft)">
    <rect x="258" y="453" width="214" height="66" rx="18" fill="#ffffff" stroke="#ece5f3" stroke-width="1.5"/>
  </g>
  <circle cx="296" cy="486" r="22" fill="#f0e5f3"/>
  <g transform="translate(296 486)" fill="none" stroke="#7a4d95" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3-13H-8a2 2 0 0 0-2 2v22a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V-4Z"/><path d="M3-13v9h9M-4 6h10M-4 11h7"/></g>
  <text x="330" y="492" fill="#3f1e52" font-family="Manrope, Segoe UI, sans-serif" font-size="21" font-weight="800" letter-spacing="0.5">ΕΔΟΕΑΠ</text>

  <!-- Ταμεία Στρατού ΥΕΘΑ (left-upper) -->
  <g filter="url(#soft)">
    <rect x="175" y="196" width="214" height="66" rx="18" fill="#ffffff" stroke="#ece5f3" stroke-width="1.5"/>
  </g>
  <circle cx="213" cy="229" r="22" fill="#f0e5f3"/>
  <g transform="translate(213 229)" fill="none" stroke="#7a4d95" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M0 -13-12-8v8c0 7.5 5 12 12 15 7-3 12-7.5 12-15v-8z"/><path d="m0 -6 1.8 3.6 4 .6-2.9 2.8.7 4L0 5.2l-3.6 1.8.7-4L-5.8-1.8l4-.6z"/></g>
  <text x="247" y="223" fill="#3f1e52" font-family="Manrope, Segoe UI, sans-serif" font-size="16" font-weight="800">Ταμεία Στρατού</text>
  <text x="247" y="245" fill="#7a4d95" font-family="Manrope, Segoe UI, sans-serif" font-size="15" font-weight="600">ΥΕΘΑ</text>
</svg>
