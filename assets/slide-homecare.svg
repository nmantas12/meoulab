<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Αιμοληψία κατ' οίκον">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6eefb"/>
      <stop offset="1" stop-color="#e6d6f2"/>
    </linearGradient>
    <linearGradient id="hdrop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a98ccb"/>
      <stop offset="1" stop-color="#8d71b0"/>
    </linearGradient>
    <radialGradient id="hglow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#hbg)"/>
  <circle cx="1150" cy="360" r="440" fill="url(#hglow)"/>
  <circle cx="1460" cy="720" r="170" fill="#ffffff" opacity="0.28"/>

  <!-- dotted path -->
  <path d="M470 820 C 640 820 700 700 880 690" fill="none" stroke="#b79fce" stroke-width="7" stroke-linecap="round" stroke-dasharray="2 30" opacity="0.8"/>

  <!-- ground -->
  <ellipse cx="1180" cy="880" rx="360" ry="46" fill="#7a4d95" opacity="0.12"/>

  <!-- House -->
  <g transform="translate(1000 380)">
    <rect x="60" y="120" width="440" height="360" rx="24" fill="#ffffff"/>
    <path d="M20 140 L280 -20 L540 140 Z" fill="#8d71b0"/>
    <path d="M280 -20 L540 140 L490 140 L280 24 Z" fill="#7a4d95"/>
    <!-- door -->
    <rect x="230" y="300" width="100" height="180" rx="14" fill="#e7d3f0"/>
    <circle cx="312" cy="392" r="8" fill="#8d71b0"/>
    <!-- window with heart -->
    <rect x="360" y="210" width="100" height="100" rx="14" fill="#f0e5f3"/>
    <path d="M410 300 c-14 -18 -42 -8 -42 14 0 18 24 32 42 46 18 -14 42 -28 42 -46 0 -22 -28 -32 -42 -14z" fill="#e79bb0"/>
    <!-- chimney cross -->
    <rect x="120" y="260" width="70" height="70" rx="12" fill="#f0e5f3"/>
    <g fill="#8d71b0"><rect x="149" y="272" width="12" height="46" rx="6"/><rect x="132" y="289" width="46" height="12" rx="6"/></g>
  </g>

  <!-- location pin above house -->
  <g transform="translate(1250 150)">
    <path d="M0 0 C 55 0 90 40 90 92 C 90 150 0 210 0 210 C 0 210 -90 150 -90 92 C -90 40 -55 0 0 0 Z" fill="#662282"/>
    <circle cx="0" cy="86" r="40" fill="#ffffff"/>
    <g fill="#662282"><rect x="-6" y="66" width="12" height="40" rx="6"/><rect x="-20" y="80" width="40" height="12" rx="6"/></g>
  </g>

  <!-- droplet with medical bag -->
  <g transform="translate(520 470)">
    <!-- arm holding bag -->
    <path d="M120 90 q70 30 78 96" fill="none" stroke="#8d71b0" stroke-width="24" stroke-linecap="round"/>
    <!-- bag -->
    <g transform="translate(212 250)">
      <rect x="-60" y="-40" width="120" height="96" rx="18" fill="#ffffff"/>
      <path d="M-30 -40 v-14 a30 30 0 0 1 60 0 v14" fill="none" stroke="#8d71b0" stroke-width="12"/>
      <g fill="#e0503f"><rect x="-11" y="-20" width="22" height="56" rx="6"/><rect x="-33" y="2" width="66" height="22" rx="6"/></g>
    </g>
    <!-- body -->
    <path d="M0 -210 C 72 -110 140 -46 140 38 A 140 140 0 1 1 -140 38 C -140 -46 -72 -110 0 -210 Z" fill="url(#hdrop)"/>
    <path d="M-64 -60 C -102 -16 -110 28 -92 66" fill="none" stroke="#ffffff" stroke-width="15" stroke-linecap="round" opacity="0.5"/>
    <!-- face -->
    <g transform="translate(0 18)">
      <circle cx="-38" cy="-16" r="14" fill="#3f1e52"/>
      <circle cx="38" cy="-16" r="14" fill="#3f1e52"/>
      <circle cx="-33" cy="-21" r="4.5" fill="#fff"/>
      <circle cx="43" cy="-21" r="4.5" fill="#fff"/>
      <ellipse cx="-66" cy="16" rx="16" ry="11" fill="#e79bb0" opacity="0.75"/>
      <ellipse cx="66" cy="16" rx="16" ry="11" fill="#e79bb0" opacity="0.75"/>
      <path d="M-30 16 q30 36 60 0" fill="none" stroke="#3f1e52" stroke-width="8" stroke-linecap="round"/>
    </g>
  </g>

  <g stroke="#c9b4dd" stroke-width="8" stroke-linecap="round" opacity="0.7">
    <path d="M760 250 h34 M777 233 v34"/>
    <path d="M1470 400 h30 M1485 385 v30"/>
  </g>
</svg>
